<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族チャットボット</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #7494c0; /* 親しみやすいチャット背景色 */
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 15px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-all;
    }
    .user-message {
      background-color: #85e249;
      color: #000;
      align-self: flex-end;
      border-top-right-radius: 2px;
    }
    .ai-message {
      background-color: #fff;
      color: #000;
      align-self: flex-start;
      border-top-left-radius: 2px;
    }
    #input-container {
      background-color: #fff;
      padding: 10px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #ddd;
    }
    #message-input {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 16px;
      outline: none;
    }
    #send-button {
      background-color: #5c78a1;
      color: #fff;
      border: none;
      padding: 0 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    #send-button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- メッセージ表示エリア -->
  <div id="chat-container">
    <div class="message ai-message">おかえり！今日もお疲れ様。</div>
  </div>

  <!-- 下部入力エリア -->
  <div id="input-container">
    <input type="text" id="message-input" placeholder="メッセージを入力..." autocomplete="off">
    <button id="send-button">送信</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');

    // 画面に吹出しを追加する処理
    function addMessage(text, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
      messageDiv.textContent = text;
      chatContainer.appendChild(messageDiv);
      
      // 自動で一番下までスクロール
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // メッセージを送信するメイン処理
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // 連打・誤入力防止のために一時的に無効化
      messageInput.value = '';
      messageInput.disabled = true;
      sendButton.disabled = true;

      // 自分のメッセージを画面に表示
      addMessage(text, true);

      try {
        // 自身のWorkersサーバー（POST）へデータを送信
        const response = await fetch("", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text }) // 家族追加前のシンプルなデータ構造
        });

        if (!response.ok) {
          throw new Error('サーバー通信に失敗しました');
        }

        const data = await response.json();

        // AIからの返答テキストを画面に表示
        addMessage(data.reply, false);

        // 💡 【音声再生処理】音声データ（Base64）が含まれていれば再生
        if (data.audio) {
          const audioUrl = `data:audio/wav;base64,${data.audio}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => {
            console.error("ブラウザによる自動再生ブロック、または音声エラー:", err);
          });
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまくお返事できなかったよ…", false);
      } finally {
        // 入力欄とボタンを再有効化
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    // 送信ボタンが押された時の処理
    sendButton.addEventListener('click', sendMessage);

    // 入力欄でEnterキーが押された時の処理
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
