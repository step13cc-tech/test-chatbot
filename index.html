<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族チャットボット (自動ハンズフリー)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #7494c0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 15px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-all;
    }
    .user-message {
      background-color: #85e249;
      color: #000;
      align-self: flex-end;
      border-top-right-radius: 2px;
    }
    .ai-message {
      background-color: #fff;
      color: #000;
      align-self: flex-start;
      border-top-left-radius: 2px;
    }
    #input-container {
      background-color: #fff;
      padding: 10px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #ddd;
      align-items: center;
    }
    #message-input {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 16px;
      outline: none;
    }
    .btn {
      border: none;
      height: 40px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #mic-button {
      background-color: #f0f0f0;
      width: 40px;
      font-size: 18px;
    }
    /* 連打や録音中のアニメーション */
    #mic-button.recording {
      background-color: #ff4d4d;
      color: white;
      animation: pulse 1.5s infinite;
    }
    #send-button {
      background-color: #5c78a1;
      color: #fff;
      padding: 0 15px;
    }
    .btn:disabled, #message-input:disabled {
      background-color: #e0e0e0;
      color: #aaa;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="chat-container">
    <div class="message ai-message">おかえり！自動会話モードの準備、いつでもいいよ。</div>
  </div>

  <div id="input-container">
    <button id="mic-button" class="btn" title="自動会話スタート">🎙️</button>
    <input type="text" id="message-input" placeholder="メッセージを入力、またはマイク..." autocomplete="off">
    <button id="send-button" class="btn">送信</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const micButton = document.getElementById('mic-button');

    let mediaRecorder = null;
    let audioChunks = [];
    
    // 💡 自動会話用の一元管理フラグと変数
    let isAutoMode = false; 
    let audioStream = null;
    let audioContext = null;
    let analyser = null;
    let silenceStart = 0;
    let hasSpoken = false;
    let animationFrameId = null;

    function addMessage(text, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
      messageDiv.textContent = text;
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function setControlsDisabledForText(disabled) {
      messageInput.disabled = disabled;
      sendButton.disabled = disabled;
    }

    // --- 🎙️ マイクボタンを押したときの処理（自動モードのON/OFF切り替え） ---
    micButton.addEventListener('click', async () => {
      if (!isAutoMode) {
        // 【ONにする】
        isAutoMode = true;
        micButton.classList.add('recording');
        micButton.textContent = "🎙️";
        messageInput.placeholder = "自動会話中... スマホを置いて話しかけてね";
        setControlsDisabledForText(true); // キーボード入力をロック
        
        await startAutoConversation();
      } else {
        // 【OFFにする（終了）】
        stopAutoConversation();
      }
    });

    // 🎙️ 録音と音量監視を開始するメイン関数
    async function startAutoConversation() {
      audioChunks = [];
      try {
        // 最初の一回だけマイクのストリーム（許可）を取得して使い回す
        if (!audioStream) {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }
        
        // 音声をリアルタイム分析するWeb Audio APIの準備
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          const source = audioContext.createMediaStreamSource(audioStream);
          source.connect(analyser);
          analyser.fftSize = 512;
        }
        
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const options = MediaRecorder.isTypeSupported('audio/webm') ? { mimeType: 'audio/webm' } : {};
        mediaRecorder = new MediaRecorder(audioStream, options);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          // ボタンが手動でOFFにされていなければサーバーへ送信
          if (isAutoMode) {
            await sendAudioToServer(audioBlob);
          }
        };

        mediaRecorder.start();
        
        // 変数を初期化して無音検知ループをスタート
        hasSpoken = false;
        silenceStart = Date.now();
        checkSilence();

      } catch (err) {
        console.error("マイクエラー:", err);
        alert("マイクの使用を許可してください。");
        stopAutoConversation();
      }
    }

    // 🧠 喋り終わり（無音）をリアルタイムに自動検知するループ
    function checkSilence() {
      if (!isAutoMode || !analyser) return;

      const array = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(array);
      
      // 今の平均音量を計算
      let total = 0;
      for (let i = 0; i < array.length; i++) {
        total += array[i];
      }
      let average = total / array.length;

      // 💡 感度調整（環境の雑音に合わせて10〜15の間で微調整してください）
      const THRESHOLD = 12; 
      const SILENCE_DURATION = 1500; // 1500ミリ秒（1.5秒）無音が続いたら送信

      if (average > THRESHOLD) {
        // 声を検知している状態
        if (!hasSpoken) {
          hasSpoken = true;
          micButton.textContent = "🔴"; // 「喋り中」のサイン
        }
        silenceStart = Date.now(); // 音を検知するたびに無音タイマーをリセット
      } else {
        // 静かな状態
        if (hasSpoken && (Date.now() - silenceStart > SILENCE_DURATION)) {
          // 「喋った後に、1.5秒間静かになった」＝ 話し終わり！
          hasSpoken = false;
          micButton.textContent = "⏳"; // 「考え中」のサイン
          if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop(); // 録音を止めると自動的に送信が走ります
            return; 
          }
        }
      }

      // 次のフレームも監視を続ける
      animationFrameId = requestAnimationFrame(checkSilence);
    }

    // 🛑 自動会話モードを安全にストップさせる関数
    function stopAutoConversation() {
      isAutoMode = false;
      hasSpoken = false;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      micButton.classList.remove('recording');
      micButton.textContent = "🎙️";
      messageInput.placeholder = "メッセージを入力、またはマイク...";
      setControlsDisabledForText(false);
    }

    // 🚀 音声データをサーバーへ送信＆返答をループさせる関数
    async function sendAudioToServer(blob) {
      const formData = new FormData();
      formData.append('file', blob);

      try {
        const response = await fetch("", { method: "POST", body: formData });
        if (!response.ok) throw new Error('サーバー通信に失敗しました');

        const data = await response.json();

        if (data.user_text) addMessage(data.user_text, true);
        addMessage(data.reply, false);

        // 音声再生
        if (data.audio) {
          const audioUrl = `data:audio/wav;base64,${data.audio}`;
          const audio = new Audio(audioUrl);
          
          if (isAutoMode) micButton.textContent = "🔊"; // 「AIお喋り中」のサイン

          audio.play().catch(err => console.error("自動再生ブロック:", err));
          
          // 💡 ここが魔法のバトンタッチ！AIが喋り終わったら自動で次の聞き取りを開始
          audio.onended = () => {
            if (isAutoMode) {
              micButton.textContent = "🎙️"; // 「聞き取り待ち」に戻す
              // スピーカーの残響音をマイクが拾わないよう、400msだけ待ってから優しく再開
              setTimeout(() => {
                if (isAutoMode) startAutoConversation();
              }, 400);
            }
          };
        } else {
          // もし音声データがなかったら1秒後に再開
          if (isAutoMode) {
            setTimeout(() => { if (isAutoMode) startAutoConversation(); }, 1000);
          }
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまく聞き取れなかったか、お返事できなかったよ…", false);
        stopAutoConversation(); // エラー時は安全のために一度自動モードを解除します
      }
    }

    // --- 従来のテキスト送信処理（そのまま残してあるのでキーボードも使えます） ---
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = '';
      setControlsDisabledForText(true);
      micButton.disabled = true;
      addMessage(text, true);

      try {
        const response = await fetch("", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) throw new Error('サーバー通信に失敗しました');

        const data = await response.json();
        addMessage(data.reply, false);

        if (data.audio) {
          const audioUrl = `data:audio/wav;base64,${data.audio}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.error("自動再生ブロック:", err));
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまくお返事できなかったよ…", false);
      } finally {
        setControlsDisabledForText(false);
        micButton.disabled = false;
        messageInput.focus();
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
