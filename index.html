<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族チャットボット (音声対応)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #7494c0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 15px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-all;
    }
    .user-message {
      background-color: #85e249;
      color: #000;
      align-self: flex-end;
      border-top-right-radius: 2px;
    }
    .ai-message {
      background-color: #fff;
      color: #000;
      align-self: flex-start;
      border-top-left-radius: 2px;
    }
    #input-container {
      background-color: #fff;
      padding: 10px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #ddd;
      align-items: center;
    }
    #message-input {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 16px;
      outline: none;
    }
    .btn {
      border: none;
      height: 40px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #mic-button {
      background-color: #f0f0f0;
      width: 40px;
      font-size: 18px;
    }
    #mic-button.recording {
      background-color: #ff4d4d;
      color: white;
      animation: pulse 1.5s infinite;
    }
    #send-button {
      background-color: #5c78a1;
      color: #fff;
      padding: 0 15px;
    }
    .btn:disabled, #message-input:disabled {
      background-color: #e0e0e0;
      color: #aaa;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="chat-container">
    <div class="message ai-message">おかえり！今日もお疲れ様。</div>
  </div>

  <div id="input-container">
    <button id="mic-button" class="btn" title="声で話す">🎙️</button>
    <input type="text" id="message-input" placeholder="メッセージを入力、またはマイク..." autocomplete="off">
    <button id="send-button" class="btn">送信</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const micButton = document.getElementById('mic-button');

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    // 画面にメッセージを追加
    function addMessage(text, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
      messageDiv.textContent = text;
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 画面の入力全般を一括ロック・解除する
    function setControlsDisabled(disabled) {
      messageInput.disabled = disabled;
      sendButton.disabled = disabled;
      micButton.disabled = disabled;
    }

    // --- 【新機能】音声録音のコントロール処理 ---
    micButton.addEventListener('click', async () => {
      if (!isRecording) {
        // 🎙️ 録音開始
        audioChunks = [];
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          
          // ブラウザごとの互換性を考慮した録音設定
          const options = MediaRecorder.isTypeSupported('audio/webm') ? { mimeType: 'audio/webm' } : {};
          mediaRecorder = new MediaRecorder(stream, options);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) audioChunks.push(event.data);
          };

          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            stream.getTracks().forEach(track => track.stop()); // マイクをオフにする
            
            // 音声データをWorkersに送信
            await sendAudioToServer(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          micButton.classList.add('recording');
          messageInput.placeholder = "お話し中... もう一度ボタンを押して送信";
          messageInput.disabled = true;
          sendButton.disabled = true;

        } catch (err) {
          console.error("マイクの許可が得られませんでした:", err);
          alert("マイクの使用を許可してください。");
        }
      } else {
        // 🛑 録音停止（自動的に送信処理へ移る）
        mediaRecorder.stop();
        isRecording = false;
        micButton.classList.remove('recording');
        messageInput.placeholder = "送信中...";
      }
    });

    // 🎙️ 音声データをサーバーへPOST送信する関数
    async function sendAudioToServer(blob) {
      setControlsDisabled(true);

      const formData = new FormData();
      formData.append('file', blob);

      try {
        const response = await fetch("", {
          method: "POST",
          body: formData // 音声ファイルをFormData形式で送信
        });

        if (!response.ok) throw new Error('サーバー通信に失敗しました');

        const data = await response.json();

        // 💡 Whisperが聞き取った「あなたの言葉」を画面に出す
        if (data.user_text) {
          addMessage(data.user_text, true);
        }

        // AIからの返答テキストを表示
        addMessage(data.reply, false);

        // 音声再生
        if (data.audio) {
          const audioUrl = `data:audio/wav;base64,${data.audio}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.error("自動再生ブロック:", err));
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまく聞き取れなかったか、お返事できなかったよ…", false);
      } finally {
        setControlsDisabled(false);
        messageInput.placeholder = "メッセージを入力、またはマイク...";
        messageInput.focus();
      }
    }

    // --- 従来のテキスト送信処理 ---
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = '';
      setControlsDisabled(true);
      addMessage(text, true);

      try {
        const response = await fetch("", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) throw new Error('サーバー通信に失敗しました');

        const data = await response.json();
        addMessage(data.reply, false);

        if (data.audio) {
          const audioUrl = `data:audio/wav;base64,${data.audio}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.error("自動再生ブロック:", err));
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまくお返事できなかったよ…", false);
      } finally {
        setControlsDisabled(false);
        messageInput.focus();
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
