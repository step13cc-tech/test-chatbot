<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族チャットボット (iOS Chrome完全対応)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #7494c0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 15px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-all;
    }
    .user-message {
      background-color: #85e249;
      color: #000;
      align-self: flex-end;
      border-top-right-radius: 2px;
    }
    .ai-message {
      background-color: #fff;
      color: #000;
      align-self: flex-start;
      border-top-left-radius: 2px;
    }
    #input-container {
      background-color: #fff;
      padding: 10px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #ddd;
      align-items: center;
    }
    #message-input {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 16px;
      outline: none;
    }
    .btn {
      border: none;
      height: 40px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #mic-button {
      background-color: #f0f0f0;
      width: 40px;
      font-size: 18px;
    }
    #mic-button.recording {
      background-color: #ff4d4d;
      color: white;
      animation: pulse 1.5s infinite;
    }
    #send-button {
      background-color: #5c78a1;
      color: #fff;
      padding: 0 15px;
    }
    .btn:disabled, #message-input:disabled {
      background-color: #e0e0e0;
      color: #aaa;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="chat-container">
    <div class="message ai-message">おかえり！自動会話モードの準備、いつでもいいよ。</div>
  </div>

  <div id="input-container">
    <button id="mic-button" class="btn" title="自動会話スタート">🎙️</button>
    <input type="text" id="message-input" placeholder="メッセージを入力、またはマイク..." autocomplete="off">
    <button id="send-button" class="btn">送信</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const micButton = document.getElementById('mic-button');

    const aiPlayer = new Audio(); 

    let mediaRecorder = null;
    let audioChunks = [];
    
    let isAutoMode = false; 
    let audioStream = null;
    let audioContext = null;
    let analyser = null;
    let silenceStart = 0;
    let hasSpoken = false;
    let animationFrameId = null;

    function addMessage(text, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
      messageDiv.textContent = text;
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function setControlsDisabledForText(disabled) {
      messageInput.disabled = disabled;
      sendButton.disabled = disabled;
    }

    micButton.addEventListener('click', async () => {
      aiPlayer.play().then(() => { aiPlayer.pause(); }).catch(e => console.log("Audio Unlocked"));

      if (!isAutoMode) {
        isAutoMode = true;
        micButton.classList.add('recording');
        micButton.textContent = "🎙️";
        messageInput.placeholder = "自動会話中... スマホを置いて話しかけてね";
        setControlsDisabledForText(true);
        
        await startAutoConversation();
      } else {
        stopAutoConversation();
      }
    });

    async function startAutoConversation() {
      audioChunks = [];
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(audioStream);
        source.connect(analyser);
        analyser.fftSize = 512;
        
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        // 💡 【高速化】音質を文字起こしに最適な32kbpsに制限し、アップロードサイズを大幅削減
        const options = MediaRecorder.isTypeSupported('audio/webm') 
          ? { mimeType: 'audio/webm', audioBitsPerSecond: 32000 } 
          : { audioBitsPerSecond: 32000 };
        
        mediaRecorder = new MediaRecorder(audioStream, options);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          
          if (audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
            audioStream = null;
          }
          if (audioContext) {
            await audioContext.close();
            audioContext = null;
            analyser = null;
          }

          if (isAutoMode) {
            await sendAudioToServer(audioBlob);
          }
        };

        mediaRecorder.start();
        
        hasSpoken = false;
        silenceStart = Date.now();
        checkSilence();

      } catch (err) {
        console.error("マイクエラー:", err);
        alert("マイクの使用を許可してください。");
        stopAutoConversation();
      }
    }

    function checkSilence() {
      if (!isAutoMode || !analyser) return;

      const array = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(array);
      
      let total = 0;
      for (let i = 0; i < array.length; i++) {
        total += array[i];
      }
      let average = total / array.length;

      const THRESHOLD = 12; 
      // 💡 【高速化】無音の待ち時間を 1500ms(1.5秒) ➔ 700ms(0.7秒) に短縮！
      const SILENCE_DURATION = 700; 

      if (average > THRESHOLD) {
        if (!hasSpoken) {
          hasSpoken = true;
          micButton.textContent = "🔴"; 
        }
        silenceStart = Date.now(); 
      } else {
        if (hasSpoken && (Date.now() - silenceStart > SILENCE_DURATION)) {
          hasSpoken = false;
          micButton.textContent = "⏳"; 
          if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop(); 
            return; 
          }
        }
      }

      animationFrameId = requestAnimationFrame(checkSilence);
    }

    function stopAutoConversation() {
      isAutoMode = false;
      hasSpoken = false;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
      }
      micButton.classList.remove('recording');
      micButton.textContent = "🎙️";
      messageInput.placeholder = "メッセージを入力、またはマイク...";
      setControlsDisabledForText(false);
    }

    async function sendAudioToServer(blob) {
      const formData = new FormData();
      formData.append('file', blob);

      try {
        const response = await fetch("", { method: "POST", body: formData });
        if (!response.ok) throw new Error('サーバー通信に失敗しました');

        const data = await response.json();

        if (data.user_text) addMessage(data.user_text, true);
        addMessage(data.reply, false);

        if (data.audio) {
          aiPlayer.src = `data:audio/wav;base64,${data.audio}`;
          
          if (isAutoMode) micButton.textContent = "🔊"; 

          aiPlayer.play().catch(err => {
            console.error("再生ブロックされました:", err);
          });
          
          aiPlayer.onended = () => {
            if (isAutoMode) {
              micButton.textContent = "🎙️";
              setTimeout(() => {
                if (isAutoMode) startAutoConversation(); 
              }, 300); // 💡 次の聞き取り開始のディレイも少し詰めました
            }
          };
        } else {
          if (isAutoMode) {
            setTimeout(() => { if (isAutoMode) startAutoConversation(); }, 800);
          }
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまくお返事できなかったよ…", false);
        stopAutoConversation();
      }
    }

    async function sendMessage() {
      aiPlayer.play().then(() => { aiPlayer.pause(); }).catch(() => {});

      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = '';
      setControlsDisabledForText(true);
      micButton.disabled = true;
      addMessage(text, true);

      try {
        const response = await fetch("", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) throw new Error('サーバー通信に失敗しました');

        const data = await response.json();
        addMessage(data.reply, false);

        if (data.audio) {
          aiPlayer.src = `data:audio/wav;base64,${data.audio}`;
          aiPlayer.play().catch(err => console.error("再生エラー:", err));
        }

      } catch (error) {
        console.error(error);
        addMessage("ごめんね、うまくお返事できなかったよ…", false);
      } finally {
        setControlsDisabledForText(false);
        micButton.disabled = false;
        messageInput.focus();
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
